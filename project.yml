name: SolarExplorer
options:
  bundleIdPrefix: com.solarexplorer
  deploymentTarget:
    visionOS: "2.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
targets:
  SolarExplorer:
    type: application
    platform: visionOS
    sources:
      - path: SolarExplorer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solarexplorer.app
        INFOPLIST_FILE: SolarExplorer/Info.plist
        SUPPORTED_PLATFORMS: "xros xrsimulator"
        TARGETED_DEVICE_FAMILY: "7"
        SWIFT_VERSION: "6.0"
    info:
      path: SolarExplorer/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationPreferredDefaultSceneSessionRole: UIWindowSceneSessionRoleApplication
          UISceneConfigurations: {}
        UILaunchScreen: {}
  SolarExplorerTests:
    type: bundle.unit-test
    platform: visionOS
    sources:
      - path: SolarExplorerTests
    dependencies:
      - target: SolarExplorer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solarexplorer.tests
        SWIFT_VERSION: "6.0"
